<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Titickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css" />
    <style>
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner-box { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Titickets</a>
            <div><a href="register.html" class="btn btn-primary px-4">Регистрация</a></div>
        </div>
    </header>

    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="event-card p-4 p-xl-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle" style="font-size: 4rem; color: var(--rose);"></i>
                        <h2 class="mt-3 fw-bold" style="color: var(--rose);">Вход в аккаунт</h2>
                        <p class="text-muted">Введите свои данные для входа</p>
                    </div>
                    <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-envelope me-2" style="color: var(--rose);"></i>Электронная почта</label>
                            <input type="email" id="loginEmail" class="form-control form-control-lg rounded-pill border-2" placeholder="example@mail.ru" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-lock me-2" style="color: var(--rose);"></i>Пароль</label>
                            <input type="password" id="loginPassword" class="form-control form-control-lg rounded-pill border-2" placeholder="··········" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="remember"><label class="form-check-label" for="remember">Запомнить меня</label></div>
                        </div>
                        <button type="submit" class="btn btn-rose w-100 py-3 mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>Войти</button>
                        <p class="text-center mb-0">Нет аккаунта? <a href="register.html" class="text-decoration-none fw-semibold" style="color: var(--rose);">Зарегистрироваться</a></p>
                    </form>
                    <div class="divider my-4">или войдите, используя своего голубя</div>
                    <div class="d-flex justify-content-center">
                        <button type="button" class="btn btn-outline-rose rounded-circle pigeon-btn" data-bs-toggle="modal" data-bs-target="#pigeonModal"> 🕊️ </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="spinner-overlay" style="display: none;"><div class="spinner-box"><div class="spinner-border text-rose" style="width:3rem;height:3rem;"></div><p class="mt-3 mb-0">Вход в аккаунт...</p></div></div>

    <!-- Модальное окно для голубя -->
    <div class="modal fade" id="pigeonModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Вход через голубиную почту 🕊️</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><div class="mb-3"><label class="form-label">ID голубя</label><input type="text" id="pigeonId" class="form-control" placeholder="Введите ID голубя"></div>
        <div class="mb-3" id="smsSection" style="display: none;"><label class="form-label">Код из SMS</label><input type="text" id="smsCode" class="form-control" placeholder="Введите код из SMS"><small class="text-muted">Код отправлен на пейджер голубя</small></div>
        <div id="pigeonError" class="alert alert-danger" style="display: none;"></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button><button type="button" id="sendSmsBtn" class="btn btn-rose">Отправить SMS</button><button type="button" id="verifySmsBtn" class="btn btn-rose" style="display: none;">Подтвердить</button></div></div></div>
    </div>

    <footer class="text-center py-4 mt-auto"><p class="text-muted small mb-0">© 2026 Titickets. Все права защищены.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let tempPigeonUser = null, generatedCode = null, smsTimeout;

    function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }

    function saveSessionAndRedirect(user, remember = false) {
        if (!user || !user.role) {
            console.error('Ошибка: пользователь или его роль не определены', user);
            alert('Ошибка: данные пользователя неполные. Обратитесь к администратору.');
            return false;
        }
        const { password, ...safeUser } = user;
        localStorage.setItem('accessToken', btoa(`${safeUser.email}:${Date.now()}`));
        localStorage.setItem('user', JSON.stringify(safeUser));
        if (remember) localStorage.setItem('rememberMe', 'true');
        const redirectUrl = safeUser.role === 'organizer' ? 'organizerAcc.html' : 'personalAcc.html';
        window.location.href = redirectUrl;
        return true;
    }

    // Обычная форма входа (без изменений)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const remember = document.getElementById('remember').checked;
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        if (!email || !password) { errorDiv.textContent = 'Заполните все поля'; errorDiv.style.display = 'block'; return; }
        if (!email.includes('@')) { errorDiv.textContent = 'Введите корректный email'; errorDiv.style.display = 'block'; return; }

        showLoading(true);
        try {
            const res = await fetch('http://localhost:3000/users');
            if (!res.ok) throw new Error('Сервер не отвечает');
            const users = await res.json();
            const user = users.find(u => u.email === email);
            if (!user) throw new Error('Пользователь не найден');
            if (user.password === password) {
                saveSessionAndRedirect(user, remember);
            } else {
                errorDiv.textContent = 'Неверный email или пароль';
                errorDiv.style.display = 'block';
                showLoading(false);
            }
        } catch (err) {
            errorDiv.textContent = err.message || 'Ошибка сервера';
            errorDiv.style.display = 'block';
            showLoading(false);
        }
    });

    // Отправка SMS (кода) для голубя
    document.getElementById('sendSmsBtn').addEventListener('click', async () => {
        const pigeonId = document.getElementById('pigeonId').value;
        const errorDiv = document.getElementById('pigeonError');
        errorDiv.style.display = 'none';
        if (!pigeonId) { errorDiv.textContent = 'Введите ID голубя'; errorDiv.style.display = 'block'; return; }
        const sendBtn = document.getElementById('sendSmsBtn');
        sendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Отправка...';
        sendBtn.disabled = true;
        try {
            const res = await fetch('http://localhost:3000/users');
            if (!res.ok) throw new Error();
            const users = await res.json();
            const user = users.find(u => u.pigeonId === pigeonId);
            if (user) {
                tempPigeonUser = user;
                generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
                alert(`📱 Тестовый код подтверждения: ${generatedCode}`);
                document.getElementById('smsSection').style.display = 'block';
                document.getElementById('sendSmsBtn').style.display = 'none';
                document.getElementById('verifySmsBtn').style.display = 'block';
                smsTimeout = setTimeout(() => { 
                    resetPigeonModal(); 
                    errorDiv.textContent = 'Время истекло'; 
                    errorDiv.style.display = 'block'; 
                }, 60000);
            } else {
                errorDiv.textContent = `Голубь с ID "${pigeonId}" не найден`;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка сервера';
            errorDiv.style.display = 'block';
        } finally { 
            sendBtn.innerHTML = 'Отправить SMS'; 
            sendBtn.disabled = false; 
        }
    });

    function resetPigeonModal() {
        document.getElementById('smsSection').style.display = 'none';
        document.getElementById('sendSmsBtn').style.display = 'block';
        document.getElementById('verifySmsBtn').style.display = 'none';
        document.getElementById('smsCode').value = '';
        document.getElementById('pigeonId').value = '';
        document.getElementById('pigeonError').style.display = 'none';
        if (smsTimeout) clearTimeout(smsTimeout);
        generatedCode = null;
        tempPigeonUser = null;
    }

    // ИСПРАВЛЕННЫЙ обработчик подтверждения кода
    document.getElementById('verifySmsBtn').addEventListener('click', () => {
        const code = document.getElementById('smsCode').value;
        const errorDiv = document.getElementById('pigeonError');
        if (!code) {
            errorDiv.textContent = 'Введите код';
            errorDiv.style.display = 'block';
            return;
        }

        if (code === generatedCode && tempPigeonUser) {
            clearTimeout(smsTimeout);
            
            // Сохраняем пользователя до сброса модалки
            const userToLogin = tempPigeonUser;
            
            // Закрываем модальное окно
            const modalElement = document.getElementById('pigeonModal');
            const modal = bootstrap.Modal.getInstance(modalElement);
            if (modal) {
                modal.hide();
            } else {
                // Fallback: закрываем вручную
                modalElement.classList.remove('show');
                document.body.classList.remove('modal-open');
                const backdrop = document.querySelector('.modal-backdrop');
                if (backdrop) backdrop.remove();
            }
            
            // Сбрасываем состояние (tempPigeonUser станет null)
            resetPigeonModal();
            
            // Выполняем переадресацию с сохранённой копией
            saveSessionAndRedirect(userToLogin, false);
        } else {
            errorDiv.textContent = 'Неверный код';
            errorDiv.style.display = 'block';
        }
    });

    document.getElementById('pigeonModal').addEventListener('hidden.bs.modal', resetPigeonModal);
</script>
</body>
</html>
