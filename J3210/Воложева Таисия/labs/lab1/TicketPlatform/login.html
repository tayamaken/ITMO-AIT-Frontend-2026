<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">
    <header class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Titickets</a>
            <div>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 col-xl-5">
                <div class="event-card p-4 p-xl-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle" style="font-size: 4rem; color: var(--rose);"></i>
                        <h2 class="mt-3 fw-bold" style="color: var(--rose);">Вход в аккаунт</h2>
                        <p class="text-muted">Введите свои данные для входа</p>
                    </div>

                    <form>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-envelope me-2" style="color: var(--rose);"></i>Электронная почта
                            </label>
                            <input type="email" class="form-control form-control-lg rounded-pill border-2"
                                placeholder="example@mail.ru" style="border-color: rgba(232,62,140,0.2);" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-lock me-2" style="color: var(--rose);"></i>Пароль
                            </label>
                            <input type="password" class="form-control form-control-lg rounded-pill border-2"
                                placeholder="··········" style="border-color: rgba(232,62,140,0.2);" required>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember"
                                    style="border-color: var(--rose);">
                                <label class="form-check-label" for="remember">
                                    Запомнить меня
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none" style="color: var(--rose);">
                                Забыли пароль?
                            </a>
                        </div>

                        <button type="submit" class="btn btn-rose w-100 py-3 mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                        </button>

                        <p class="text-center mb-0">
                            Нет аккаунта?
                            <a href="register.html" class="text-decoration-none fw-semibold"
                                style="color: var(--rose);">
                                Зарегистрироваться
                            </a>
                        </p>
                    </form>

                    <div class="divider my-4">или войдите, используя своего голубя</div>

                    <div class="d-flex justify-content-center">
                         <button class="btn btn-outline-rose rounded-circle pigeon-btn" title="Привязать голубя" > 🕊️ </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-auto">
        <p class="text-muted small mb-0">© 2026 Titickets. Все права защищены.</p>
    </footer>
</body>

</html>
