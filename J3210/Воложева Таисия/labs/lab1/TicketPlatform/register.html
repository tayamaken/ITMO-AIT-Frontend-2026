<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Titickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="navbar navbar-expand-lg border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Titickets</a>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h1 class="h3 fw-bold mb-4 text-center">Регистрация</h1>
                    
                    <div id="errorMsg" class="alert alert-danger mb-3" style="display: none;" aria-live="polite"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя <span class="text-danger" aria-hidden="true">*</span></label>
                            <input type="text" id="name" class="form-control rounded-3" autocomplete="given-name" required placeholder="Иван">
                        </div>
                        <div class="mb-3">
                            <label for="surname" class="form-label">Фамилия</label>
                            <input type="text" id="surname" class="form-control rounded-3" autocomplete="family-name" placeholder="Иванов">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email <span class="text-danger" aria-hidden="true">*</span></label>
                            <input type="email" id="email" class="form-control rounded-3" autocomplete="email" required placeholder="example@mail.ru">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль <span class="text-danger" aria-hidden="true">*</span></label>
                            <input type="password" id="password" class="form-control rounded-3" autocomplete="new-password" required minlength="6" placeholder="Минимум 6 символов">
                        </div>
                        <div class="mb-4">
                            <label for="pigeonId" class="form-label">ID голубя (опционально)</label>
                            <input type="text" id="pigeonId" class="form-control rounded-3" placeholder="Для доставки бумажных билетов">
                        </div>

                        <div class="form-check form-switch mb-4">
                            <input class="form-check-input" type="checkbox" role="switch" id="isOrganizer">
                            <label class="form-check-label" for="isOrganizer">Я организатор мероприятий</label>
                        </div>

                        <fieldset id="organizerFields" style="display: none;" class="mb-4">
                            <legend>Данные организации</legend>
                            <div class="mb-3">
                                <label for="orgName" class="form-label">Название организации</label>
                                <input type="text" id="orgName" class="form-control rounded-3" placeholder="ООО 'Тикетс'">
                            </div>
                            <div class="mb-0">
                                <label for="orgPhone" class="form-label">Контактный телефон</label>
                                <input type="tel" id="orgPhone" class="form-control rounded-3" autocomplete="tel" placeholder="+7 (999) 000-00-00">
                            </div>
                        </fieldset>

                        <button type="submit" id="registerBtn" class="btn btn-rose w-100 rounded-pill py-2 fw-bold mb-3">Зарегистрироваться</button>
                        <p class="text-center text-muted small">
                            Уже есть аккаунт? <a href="login.html" class="text-rose fw-semibold text-decoration-none">Войти</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="spinner-overlay" style="display: none;" role="alert" aria-busy="true">
        <div class="spinner-box">
            <div class="spinner-border text-rose mb-3" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <p class="mb-0 fw-semibold">Создаем аккаунт...</p>
        </div>
    </div>

    <footer class="mt-auto py-4 border-top text-center text-muted small">
        © 2026 Titickets. Все права защищены.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const isOrganizerCheckbox = document.getElementById('isOrganizer');
        const organizerFields = document.getElementById('organizerFields');
        const registerForm = document.getElementById('registerForm');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorDiv = document.getElementById('errorMsg');
        const registerBtn = document.getElementById('registerBtn');

        isOrganizerCheckbox.addEventListener('change', (e) => {
            organizerFields.style.display = e.target.checked ? 'block' : 'none';
        });

        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            
            const name = document.getElementById('name').value.trim();
            const surname = document.getElementById('surname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const pigeonId = document.getElementById('pigeonId').value.trim();
            const isOrganizer = isOrganizerCheckbox.checked;

            showLoading(true);
            registerBtn.disabled = true;

            try {
                const usersRes = await fetch('http://localhost:3000/users');
                const users = await usersRes.json();
                
                if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                    throw new Error('Пользователь с таким email уже существует');
                }
                
                const userData = {
                    name,
                    surname: surname || '',
                    email,
                    password,
                    role: isOrganizer ? 'organizer' : 'user',
                    createdAt: new Date().toISOString()
                };

                if (pigeonId) userData.pigeonId = pigeonId;
                
                if (isOrganizer) {
                    userData.organizationName = document.getElementById('orgName').value.trim() || '';
                    userData.phone = document.getElementById('orgPhone').value.trim() || '';
                }

                const createRes = await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (!createRes.ok) throw new Error('Ошибка сервера при регистрации');
                
                const createdUser = await createRes.json();

                const { password: _, ...safeUser } = createdUser;
                localStorage.setItem('accessToken', btoa(`${safeUser.email}:${Date.now()}`));
                localStorage.setItem('user', JSON.stringify(safeUser));
                
                window.location.replace(safeUser.role === 'organizer' ? 'organizerAcc.html' : 'personalAcc.html');

            } catch (err) {
                errorDiv.textContent = err.message || 'Произошла ошибка. Попробуйте позже.';
                errorDiv.style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showLoading(false);
                registerBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
