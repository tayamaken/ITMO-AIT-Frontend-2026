<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Titickets</a>
            <div>
                <a href="login.html" class="btn btn-outline-primary me-2 px-4">Вход</a>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-5 align-items-center">
            <div class="col-lg-6">
                <img src="images/burntShugar.jpg" class="img-fluid img-highlight" alt="Афиша концерта Жженый сахар">
            </div>
            <div class="col-lg-6">
                <div class="event-card">
                    <h2 class="mb-4" style="font-size: 2.2rem;">Концерт группы «Жженый сахар»</h2>
                    <div class="event-info">
                        <p><i class="bi bi-calendar-check-fill"></i> <b>Дата:</b> 16.03.2026</p>
                        <p><i class="bi bi-pin-map-fill"></i> <b>Место:</b> Москва, клуб «На чиле»</p>
                    </div>
                    <p class="lead">Приходите и жгите вместе с нами!</p>
                    <div class="d-flex flex-column flex-sm-row gap-3 mt-4">
                        <a href="#" class="btn btn-rose flex-fill py-3">Купить билет</a>
                        <button type="button" class="btn btn-outline-rose flex-fill py-3" data-bs-toggle="modal"
                            data-bs-target="#hallModal">
                            Схема зала
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="hallModal" tabindex="-1" aria-labelledby="hallModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="hallModalLabel">Схема зала</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                    </div>
                    <div class="modal-body text-center p-4">
                        <img src="images/hall_layout.jpg" class="img-fluid rounded-4" alt="Схема зала">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-rose px-4" data-bs-dismiss="modal">Закрыть</button>
                    </div>
                </div>
            </div>
        </div>

        <section class="reviews-section mt-5 pt-4">
            <h3 class="text-center">Отзывы</h3>
            <div class="row g-4 mt-2">
                <div class="col-md-4">
                    <div class="review-card card">
                        <div class="card-body">
                            <p class="card-text">ЗАЖЖЖГЛИИИ!</p>
                            <footer class="blockquote-footer">Иван</footer>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="review-card card">
                        <div class="card-body">
                            <p class="card-text">Не вкусный попкорн.</p>
                            <footer class="blockquote-footer">Мария</footer>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="review-card card">
                        <div class="card-body">
                            <p class="card-text">Норм ивент, заэдвайсю фрэндам!</p>
                            <footer class="blockquote-footer">Алексей</footer>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
