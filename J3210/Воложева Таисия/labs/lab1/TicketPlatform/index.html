<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница — Titickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <a href="#main-content" class="visually-hidden-focusable btn btn-primary m-2">Перейти к основному контенту</a>

    <header class="navbar navbar-expand-lg border-bottom" role="banner">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" aria-label="Titickets — Главная страница">Titickets</a>
            <div id="auth-buttons" class="d-flex align-items-center">
                <a href="login.html" class="btn btn-outline-primary me-2 px-4">Вход</a>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="container my-5" id="main-content">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-rose">Найти мероприятие</h1>
        </div>

        <section class="search-form card p-4 mb-5" aria-labelledby="search-heading">
            <h2 id="search-heading" class="visually-hidden">Фильтры поиска мероприятий</h2>
            <form class="row g-4" id="searchForm">
                <div class="col-md-4">
                    <label for="searchDate" class="form-label fw-semibold">
                        <svg class="icon-svg me-2 text-rose" aria-hidden="true">
                            <use xlink:href="sprite.svg#icon-calendar"></use>
                        </svg>Дата
                    </label>
                    <input type="date" id="searchDate" class="form-control form-control-lg">
                </div>
                <div class="col-md-4">
                    <label for="searchType" class="form-label fw-semibold">
                        <i class="bi bi-tags me-2 text-rose" aria-hidden="true"></i>Тип
                    </label>
                    <select id="searchType" class="form-select form-select-lg">
                        <option value="">Все категории</option>
                        <option value="Концерт">Концерт</option>
                        <option value="Театр">Театр</option>
                        <option value="Выставка">Выставка</option>
                    </select>
                </div>
                <div class="col-md-4 position-relative">
                    <label for="searchCity" class="form-label fw-semibold">
                        <svg class="icon-svg me-2 text-rose" aria-hidden="true">
                            <use xlink:href="sprite.svg#icon-geo"></use>
                        </svg>Город
                    </label>
                    <input type="text" id="searchCity" class="form-control form-control-lg" placeholder="Введите город"
                        autocomplete="off" aria-autocomplete="list" aria-controls="cityDropdown">
                    <div id="cityDropdown" class="dropdown-menu w-100" role="listbox" style="display: none;"></div>
                </div>
                <div class="col-12 text-center mt-4">
                    <button type="submit" class="btn btn-rose btn-lg px-5 py-3">
                        <i class="bi bi-search me-2" aria-hidden="true"></i>Найти мероприятия
                    </button>
                    <button type="button" id="resetFilters" class="btn btn-outline-secondary btn-lg px-5 py-3 ms-3">
                        <i class="bi bi-x-circle me-2" aria-hidden="true"></i>Сбросить фильтры
                    </button>
                </div>
            </form>
        </section>

        <section aria-labelledby="events-heading">
            <h2 id="events-heading" class="section-title text-center mb-4">Ближайшие события</h2>
            <div class="row g-4" id="events-list" aria-live="polite"></div>
        </section>
    </main>

    <footer class="border-top text-center py-4 mt-auto">
        <div class="container">
            <p class="text-muted small mb-0">© 2026 Titickets. Все права защищены. Сервис покупки билетов на
                мероприятия.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkAuth() {
            const token = localStorage.getItem('accessToken');
            let user = null;
            try {
                user = JSON.parse(localStorage.getItem('user') || 'null');
            } catch (e) { user = null; }

            const authDiv = document.getElementById('auth-buttons');

            if (token && user && user.email && user.id) {
                const myTicketsLink = user.role === 'organizer' ? '' : '<li><a class="dropdown-item" href="personalAcc.html"><i class="bi bi-ticket-perforated me-2"></i>Мои билеты</a></li>';
                const organizerLink = user.role === 'organizer' ? '<li><a class="dropdown-item" href="organizerAcc.html"><i class="bi bi-mic me-2"></i>Панель организатора</a></li>' : '';
                authDiv.innerHTML = `
                <div class="dropdown">
                    <button class="btn btn-rose dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-haspopup="true">
                        <i class="bi bi-person-circle me-1" aria-hidden="true"></i> ${user.name || user.email}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        ${myTicketsLink}
                        ${organizerLink}
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                    </ul>
                </div>
            `;
                return user;
            } else {
                localStorage.removeItem('accessToken');
                localStorage.removeItem('user');
                authDiv.innerHTML = `
                <a href="login.html" class="btn btn-outline-primary me-2 px-4">Вход</a>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            `;
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function createEventCard(event) {
            const city = event.place.split(',')[0];
            return `
            <article class="col-md-6 col-lg-4">
                <div class="event-card h-100 d-flex flex-column p-3 border rounded shadow-sm">
                    <div class="mb-2"><span class="badge bg-rose-subtle text-rose px-3 py-2 rounded-pill">${event.type}</span></div>
                    <h3 class="h4 fw-bold mb-2">${event.title}</h3>
                    <div class="event-info mb-2 text-muted">
                        <p class="mb-1"><i class="bi bi-calendar-check-fill me-1" aria-hidden="true"></i> <span class="visually-hidden">Дата:</span> ${event.date}</p>
                        <p class="mb-1"><i class="bi bi-pin-map-fill me-1" aria-hidden="true"></i> <span class="visually-hidden">Город:</span> ${city}</p>
                    </div>
                    <p class="text-muted small mb-3">${event.description ? event.description.substring(0, 100) : 'Описание отсутствует'}${event.description && event.description.length > 100 ? '...' : ''}</p>
                    <div class="mt-auto">
                        <a href="event.html?id=${event.id}" class="btn btn-outline-rose w-100 py-2" aria-label="Подробнее о мероприятии ${event.title}">
                            Подробнее
                        </a>
                    </div>
                </div>
            </article>`;
        }

        async function getUniqueCities() {
            try {
                const res = await fetch('http://localhost:3000/events');
                const events = await res.json();
                return [...new Set(events.map(e => e.place.split(',')[0]))];
            } catch { return []; }
        }

        function showCityDropdown(cities, searchTerm) {
            const dropdown = document.getElementById('cityDropdown');
            const filtered = cities.filter(c => c.toLowerCase().includes(searchTerm.toLowerCase()));
            if (filtered.length && searchTerm) {
                dropdown.innerHTML = filtered.map(city => `
                <div role="option" class="dropdown-item city-dropdown-item" tabindex="0" onclick="selectCity('${city.replace(/'/g, "\\'")}')" onkeypress="if(event.key==='Enter') selectCity('${city.replace(/'/g, "\\")}')">
                    ${city}
                </div>`).join('');
                dropdown.style.display = 'block';
            } else dropdown.style.display = 'none';
        }

        function selectCity(city) {
            document.getElementById('searchCity').value = city;
            document.getElementById('cityDropdown').style.display = 'none';
        }

        async function loadEvents(filter = {}) {
            const container = document.getElementById('events-list');
            container.innerHTML = '<div class="col-12 text-center" role="status" aria-label="Загрузка мероприятий"><div class="spinner-border text-rose"></div></div>';
            try {
                let events = await fetch('http://localhost:3000/events').then(res => res.json());
                if (filter.date) events = events.filter(e => e.date === filter.date);
                if (filter.type && filter.type !== '') events = events.filter(e => e.type === filter.type);
                if (filter.city) events = events.filter(e => e.place.split(',')[0].toLowerCase().includes(filter.city.toLowerCase()));

                container.innerHTML = '';
                if (!events.length) {
                    container.innerHTML = '<div class="col-12 text-center" role="alert"><p class="text-muted">По вашему запросу ничего не найдено 😔</p></div>';
                    return;
                }
                events.forEach(e => container.innerHTML += createEventCard(e));
            } catch (error) {
                container.innerHTML = `<div class="col-12 text-center" role="alert"><p class="text-danger">Не удалось загрузить мероприятия. Проверьте подключение к серверу.</p></div>`;
            }
        }

        function handleSearch(e) {
            e.preventDefault();
            loadEvents({
                date: document.getElementById('searchDate').value,
                type: document.getElementById('searchType').value,
                city: document.getElementById('searchCity').value.trim()
            });
        }

        function resetFilters() {
            document.getElementById('searchForm').reset();
            loadEvents();
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadEvents();
            document.getElementById('searchForm').addEventListener('submit', handleSearch);
            document.getElementById('resetFilters').addEventListener('click', resetFilters);

            const cityInput = document.getElementById('searchCity');
            let cities = [];
            getUniqueCities().then(c => cities = c);

            cityInput.addEventListener('input', (e) => showCityDropdown(cities, e.target.value));
            document.addEventListener('click', (e) => {
                if (!cityInput.contains(e.target)) document.getElementById('cityDropdown').style.display = 'none';
            });
        });
    </script>
</body>

</html>
