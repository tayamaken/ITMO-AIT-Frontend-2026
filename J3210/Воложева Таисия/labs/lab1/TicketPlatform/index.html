<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница — Titickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dropdown-menu { max-height: 200px; overflow-y: auto; }
        .city-dropdown-item { cursor: pointer; }
        .city-dropdown-item:hover { background-color: var(--rose-light); color: white; }
    </style>
</head>
<body>
    <header class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">Titickets</a>
            <div id="auth-buttons">
                <a href="login.html" class="btn btn-outline-primary me-2 px-4">Вход</a>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-rose">Найти мероприятие</h1>
        </div>

        <div class="search-form card p-4 mb-5">
            <form class="row g-4" id="searchForm">
                <div class="col-md-4">
                    <label class="form-label fw-semibold"><i class="bi bi-calendar3 me-2 text-rose"></i>Дата</label>
                    <input type="date" id="searchDate" class="form-control form-control-lg">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold"><i class="bi bi-tags me-2 text-rose"></i>Тип</label>
                    <select id="searchType" class="form-select form-select-lg">
                        <option value="">Все</option>
                        <option>Концерт</option>
                        <option>Театр</option>
                        <option>Выставка</option>
                    </select>
                </div>
                <div class="col-md-4 position-relative">
                    <label class="form-label fw-semibold"><i class="bi bi-geo-alt me-2 text-rose"></i>Город</label>
                    <input type="text" id="searchCity" class="form-control form-control-lg" placeholder="Введите город" autocomplete="off">
                    <div id="cityDropdown" class="dropdown-menu w-100" style="display: none;"></div>
                </div>
                <div class="col-12 text-center mt-3">
                    <button type="submit" class="btn btn-rose btn-lg px-5 py-3"><i class="bi bi-search me-2"></i>Найти</button>
                    <button type="button" id="resetFilters" class="btn btn-outline-secondary btn-lg px-5 py-3 ms-3"><i class="bi bi-x-circle me-2"></i>Сбросить</button>
                </div>
            </form>
        </div>

        <h2 class="section-title text-center mb-4">Ближайшие события</h2>
        <div class="row g-4" id="events-list"></div>
    </main>

    <footer class="text-center py-4 mt-auto"><p class="text-muted small mb-0">© 2026 Titickets. Все права защищены.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function checkAuth() {
        const token = localStorage.getItem('accessToken');
        let user = null;
        try {
            user = JSON.parse(localStorage.getItem('user') || 'null');
        } catch(e) { user = null; }
        
        const authDiv = document.getElementById('auth-buttons');
        
        if (token && user && user.email && user.id) {
            // Для организатора скрываем ссылку "Мои билеты"
            const myTicketsLink = user.role === 'organizer' ? '' : '<li><a class="dropdown-item" href="personalAcc.html"><i class="bi bi-ticket-perforated me-2"></i>Мои билеты</a></li>';
            const organizerLink = user.role === 'organizer' ? '<li><a class="dropdown-item" href="organizerAcc.html"><i class="bi bi-mic me-2"></i>Панель организатора</a></li>' : '';
            authDiv.innerHTML = `
                <div class="dropdown">
                    <button class="btn btn-rose dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i> ${user.name || user.email}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        ${myTicketsLink}
                        ${organizerLink}
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Выйти</a></li>
                    </ul>
                </div>
            `;
            return user;
        } else {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('user');
            authDiv.innerHTML = `
                <a href="login.html" class="btn btn-outline-primary me-2 px-4">Вход</a>
                <a href="register.html" class="btn btn-primary px-4">Регистрация</a>
            `;
            return null;
        }
    }

    function logout() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    function createEventCard(event) {
        const city = event.place.split(',')[0];
        return `
            <div class="col-md-6 col-lg-4">
                <div class="event-card h-100 d-flex flex-column p-3">
                    <div class="mb-2"><span class="badge bg-rose-subtle text-rose px-3 py-2 rounded-pill">${event.type}</span></div>
                    <h4 class="fw-bold mb-2">${event.title}</h4>
                    <div class="event-info mb-2">
                        <p><i class="bi bi-calendar-check-fill"></i> ${event.date}</p>
                        <p><i class="bi bi-pin-map-fill"></i> ${city}</p>
                    </div>
                    <p class="text-muted small mb-3">${event.description ? event.description.substring(0, 100) : 'Нет описания'}${event.description && event.description.length > 100 ? '...' : ''}</p>
                    <div class="mt-auto"><a href="event.html?id=${event.id}" class="btn btn-outline-rose w-100 py-2">Подробнее</a></div>
                </div>
            </div>`;
    }

    async function getUniqueCities() {
        try {
            const res = await fetch('http://localhost:3000/events');
            const events = await res.json();
            return [...new Set(events.map(e => e.place.split(',')[0]))];
        } catch { return []; }
    }

    function showCityDropdown(cities, searchTerm) {
        const dropdown = document.getElementById('cityDropdown');
        const filtered = cities.filter(c => c.toLowerCase().includes(searchTerm.toLowerCase()));
        if (filtered.length && searchTerm) {
            dropdown.innerHTML = filtered.map(city => `<div class="dropdown-item city-dropdown-item" onclick="selectCity('${city.replace(/'/g, "\\'")}')">${city}</div>`).join('');
            dropdown.style.display = 'block';
        } else dropdown.style.display = 'none';
    }
    
    function selectCity(city) { 
        document.getElementById('searchCity').value = city; 
        document.getElementById('cityDropdown').style.display = 'none'; 
    }

    async function loadEvents(filter = {}) {
        const container = document.getElementById('events-list');
        container.innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-rose" role="status"></div></div>';
        try {
            let events = await fetch('http://localhost:3000/events').then(res => res.json());
            if (filter.date) events = events.filter(e => e.date === filter.date);
            if (filter.type && filter.type !== '') events = events.filter(e => e.type === filter.type);
            if (filter.city) events = events.filter(e => e.place.split(',')[0].toLowerCase().includes(filter.city.toLowerCase()));
            container.innerHTML = '';
            if (!events.length) { 
                container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">По вашему запросу ничего не найдено 😔</p></div>'; 
                return; 
            }
            events.forEach(e => container.innerHTML += createEventCard(e));
        } catch (error) {
            container.innerHTML = `<div class="col-12 text-center"><p class="text-danger">Не удалось загрузить мероприятия. Убедитесь, что json-server запущен.</p></div>`;
        }
    }

    function handleSearch(e) {
        e.preventDefault();
        loadEvents({
            date: document.getElementById('searchDate').value,
            type: document.getElementById('searchType').value,
            city: document.getElementById('searchCity').value.trim()
        });
    }
    
    function resetFilters() {
        document.getElementById('searchDate').value = '';
        document.getElementById('searchType').value = '';
        document.getElementById('searchCity').value = '';
        loadEvents();
    }

    document.addEventListener('DOMContentLoaded', () => {
        checkAuth();
        loadEvents();
        document.getElementById('searchForm').addEventListener('submit', handleSearch);
        document.getElementById('resetFilters').addEventListener('click', resetFilters);
        const cityInput = document.getElementById('searchCity');
        let cities = [];
        getUniqueCities().then(c => cities = c);
        cityInput.addEventListener('input', (e) => showCityDropdown(cities, e.target.value));
        document.addEventListener('click', (e) => { if (!cityInput.contains(e.target)) document.getElementById('cityDropdown').style.display = 'none'; });
    });
    </script>
</body>
</html>
